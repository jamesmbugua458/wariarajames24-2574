<!DOCTYPE html>
<html>
<head>
    <title>CSS Types Assignment</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Internal CSS -->
    <style>
        /* Paragraph 2 */
        .internal-paragraph {
            color: orange;
            font-weight: bold;
        }

        /* Highlight 2 */
        .internal-highlight {
            color: green;
        }

        /* Building 2 */
        .internal-building {
            color: brown;
        }
    </style>
</head>

<body>

    <!-- PARAGRAPHS -->

    <p style="color: blue; font-style: italic;">
        Paragraph 1 (Inline CSS)
    </p>

    <p class="internal-paragraph">
        Paragraph 2 (Internal CSS)
    </p>

    <p class="external-paragraph">
        Paragraph 3 (External CSS)
    </p>


    <!-- HIGHLIGHTS -->

    <h1 style="color: red;">
        Highlight 1 (Inline CSS)
    </h1>

    <h1 class="internal-highlight">
        Highlight 2 (Internal CSS)
    </h1>

    <h1 class="external-highlight">
        Highlight 3 (External CSS)
    </h1>


    <!-- BUILDINGS -->

    <h3 style="color: pink;">
        Building 1 (Inline CSS)
    </h3>

    <h3 class="internal-building">
        Building 2 (Internal CSS)
    </h3>

    <h3 class="external-building">
        Building 3 (External CSS)
    </h3>

</body>
</html>
