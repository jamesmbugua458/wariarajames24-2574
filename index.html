<!DOCTYPE html>
<html>
<head>
    <title>Elite Fitness Gym</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
    h1 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 10px;
    }

    .section-title {
        color: darkred;
        text-align: center;
        margin-top: 40px;
    }

    .intro-box {
        background-color: #dfe6e9;
        padding: 15px;
        margin: 20px auto;
        text-align: center;
        width: 80%;
        border-radius: 8px;
    }

    /* Gallery Layout */
    .gallery-row {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 25px;
        flex-wrap: wrap;
    }

    .container {
        width: 30%;
        background: white;
        padding: 10px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .container img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 8px;
        transition: transform 0.4s ease;
    }

    /* Hover Effect */
    .container:hover {
        transform: translateY(-8px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .container:hover img {
        transform: scale(1.05);
    }

    /* Smooth fade-in animation */
    .container {
        animation: fadeIn 1s ease forwards;
        opacity: 0;
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
        }
    }

    /* Responsive */
    @media (max-width: 900px) {
        .container {
            width: 45%;
        }
    }

    @media (max-width: 600px) {
        .container {
            width: 100%;
        }
    }
    </style>
</head>

<body>

<h1>Elite Fitness Gym</h1>

<!-- Inline CSS still used (but cleaner now) -->
<p style="text-align:center; color:green; font-weight:bold;">
Transform Your Body. Transform Your Life.
</p>

<div class="intro-box">
    We provide professional training, modern equipment, and a supportive fitness community.
</div>

<hr>

<h2 class="section-title">Our Gym Gallery</h2>

<!-- First Row (3 Images) -->
<div class="gallery-row">

    <div class="container">
        <h3>Weight Training</h3>
        <img src="https://images.unsplash.com/photo-1583454110551-21f2fa2afe61" alt="Gym Image 1">
    </div>

    <div class="container">
        <h3>Cardio Section</h3>
        <img src="https://images.unsplash.com/photo-1599058917765-a780eda07a3e?auto=format&fit=crop&w=800&q=80" alt="Cardio Training">
        
    </div>

    <div class="container">
        <h3>Boxing Area</h3>
        <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438" alt="Gym Image 3">
    </div>

</div>

<!-- Second Row (2 Images) -->
<div class="gallery-row">

    <div class="container">
        <h3>Yoga Training</h3>
        <img src="https://images.unsplash.com/photo-1554284126-aa88f22d8b74" alt="Gym Image 4">
    </div>

    <div class="container">
        <h3>Personal Training</h3>
        <img src="https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b" alt="Gym Image 5">
    </div>

</div>

<hr>

<footer style="background-color:#2c3e50; color:white; text-align:center; padding:10px;">
© 2026 Elite Fitness Gym. All Rights Reserved.
</footer>

</body>
</html>
